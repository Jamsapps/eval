<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link href="rejoindre.css" rel="stylesheet">
    <title>Rejoindre As-Sos</title>
</head>
<body>

<!-- Formulaire pour rejoindre As-Sos -->
<div class="container-fluid mt-5">
    <form class="row justify-content-center">
        <div class="form-group row justify-content-center">
            <h3>Rejoindre As-Sos</h3>

            <label for="Prenom" class="form-label">Prénom :</label>
            <input type="text" class="form-control" id="prenom" placeholder="Prénom" required>

            <label for="Nom" class="form-label">Nom :</label>
            <input type="text" class="form-control" id="nom" placeholder="Nom" required>

            <label for="Email" class="form-label">Email :</label>
            <input type="email" class="form-control" id="email" placeholder="Votremail@exemple.com" required>

            <label for="text" class="form-label">Pourquoi, vous souhaitez nous rejoindre :</label>
            <textarea type="text" class="form-control" id="message" rows="5" placeholder="Votre message" required></textarea>

            <button type="submit" class="btn btn-primary">Envoyé</button>

        </div>
    </form>
</div>

<!-- Footer -->
<footer class="border">
    <div class="copyright">
        <p>&copy;As-Sos</p>
        <p>2020-2021</p>
    </div>
</footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
</body>
</html>
