<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link href="./css/rejoindre.css" rel="stylesheet">
    <title>Rejoindre As-Sos</title>
</head>
<body>

<header class="border-bottom">
    <h3 class="text-center">Rejoindre As-Sos</h3>
</header>

    <!-- Formulaire -->
<div class="container">
    <form class="row justify-content-center">
        <div class="d-flex flex-column bd-highlight mt-4 border">   
            <!--input and label-->
            <div class="input-group input-group-sm p-2 bd-highlight">
                <span class="input-group-text" id="inputGroup-sizing-sm">Prénom :</span>
                <input type="text" class="form-control form-control-sm" id="prenom" placeholder="Prénom" required>
            </div>
            <div class="input-group input-group-sm p-2 bd-highlight">
                <span class="input-group-text" id="inputGroup-sizing-sm">Nom :</span>
                <input type="text" class="form-control form-control-sm" id="nom" placeholder="Nom" required>
            </div>
            <div class="input-group input-group-sm p-2 bd-highlight">
                <span class="input-group-text" id="inputGroup-sizing-sm">Naissance:</span>
                <input type="date" class="form-control form-control-sm" id="date" required>
            </div>
            <div class="input-group input-group-sm p-2 bd-highlight">
                <span class="input-group-text" id="inputGroup-sizing-sm">E-mail</span>
                <input type="email" class="form-control form-control-sm" id="email" placeholder="Mail@exemple.com" required>
            </div>

            <!-- Select group -->
            <div class="select-group p-2 bd-highlight">
                <select class="form-select form-select-sm">
                    <option selected>Votre situation</option>
                    <option value="1">Étudiant</option>
                    <option value="2">En recherche d'emploi</option>
                    <option value="3">Autre</option>
                </select>
            </div>

                <!-- Text Area -->
            <div class="select-group p-2 bd-highlight">
                <textarea type="text" class="form-control form-control-sm" id="message" rows="5" placeholder="Pourquoi, souhaitez-vous nous rejoindre ?" required></textarea>
                
                <button type="submit" class="btn btn-primary">Envoyé</button>
            </div>
            </div>
        </div>    
    </form>
</div>

<!--Footer-->
<div class="container-fluid">
    <div class="row justify-content-center mt-5"> 
            
        <footer class="container">
            <!-- button home -->
            <div class="col-1">
            <button type="button" class="btn btn-dark"><a class="link" href="index.html">Accueil</a></button>
            </div>
            <!--Copyright-->
            <i class="fas fa-copyright"><p class="text-center">&copy;As-Sos 2020-2021</p></i>
        </footer>
    </div>
</div>


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous"></script>
</body>
</html>
